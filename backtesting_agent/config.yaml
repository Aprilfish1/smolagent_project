# ─────────────────────────────────────────────────────────────────────────────
# CCAR Backtesting Agent — Column Configuration
#
# Define your target variables here.  For each model target, give it a short
# name and map it to the actual column name and predicted column name in your
# dataset.  The agent will know these mappings automatically — you can refer
# to them by their short name in plain English (e.g. "analyze PD").
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Dataset file paths — nested by Market → Segment
#
# Structure:
#   datasets:
#     <MarketName>:
#       <SegmentName>: path/to/account_level.parquet
#
# The UI will show two dropdowns: one for Market, one for Segment.
# Pre-computed summary CSVs are named:  {MarketName}_{SegmentName}_summary.csv
#   (spaces in names are replaced with underscores)
# ─────────────────────────────────────────────────────────────────────────────
datasets:
  US:
    Retail:  backtesting_agent/sample_data/us_retail.parquet
    Premium: backtesting_agent/sample_data/us_premium.parquet
  UK:
    Retail:  backtesting_agent/sample_data/uk_retail.parquet
  # Add more markets and segments below:
  # CA:
  #   Retail: path/to/ca_retail_backtest.parquet

# ─────────────────────────────────────────────────────────────────────────────
# Time dimension column names
# Fill in the actual column names from your parquet file.
# ─────────────────────────────────────────────────────────────────────────────
time_columns:
  statement_month:    statement_month      # when the forecast was made
  performance_month:  performance_month    # when the outcome was observed
  # horizon is computed automatically as performance_month - statement_month

# ─────────────────────────────────────────────────────────────────────────────
# Target variables
# Add one block per model output you want to analyse.
# actual / predicted → exact column names in your parquet file.
# ─────────────────────────────────────────────────────────────────────────────
target_variables:

  Payment:
    actual:      actual_payment
    predicted:   predicted_payment
    metric_type: flow           # sum across ALL horizons per statement_month

  PurchaseVolume:
    actual:      actual_purchase_volume
    predicted:   predicted_purchase_volume
    metric_type: flow           # sum across ALL horizons per statement_month

  EOS:
    actual:      actual_eos
    predicted:   predicted_eos
    metric_type: stock          # last (max) horizon per statement_month only

# ─────────────────────────────────────────────────────────────────────────────
# Default segmentation columns
# Used when the user says "break down by segment" without being specific.
# ─────────────────────────────────────────────────────────────────────────────
default_group_by_columns:
  - product_type
  - risk_segment
  - geography

# ─────────────────────────────────────────────────────────────────────────────
# Metric type reference (for documentation)
# flow  = sum across all horizons per statement_month  (Payment, PurchaseVolume)
# stock = value at last horizon per statement_month    (EOS)
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Default row filter (pandas query syntax)
# Applied automatically to ALL analyses — both summary charts and agent requests.
# Conditions:
#   1. horizon <= 28
#   2. (statement_month <= 2020-02-01 AND performance_month <= 2020-02-01)
#      OR statement_month >= 2021-07-01
# ─────────────────────────────────────────────────────────────────────────────
default_row_filter: "horizon <= 28 and ((statement_month <= '2020-02-01' and performance_month <= '2020-02-01') or statement_month >= '2021-07-01')"

# ─────────────────────────────────────────────────────────────────────────────
# Output directory for all generated charts
# ─────────────────────────────────────────────────────────────────────────────
output_dir: ./backtesting_output
